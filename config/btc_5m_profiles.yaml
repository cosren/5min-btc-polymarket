version: 2
name: btc_5m_institutional_profiles
market: polymarket_btc_updown_5m

strategy_reference:
  style: multi_factor_momentum_with_gbm
  entry_window_seconds_left_target: 120
  entry_window_seconds_left_tolerance: 30
  btc_move_usd_min: 70
  btc_move_usd_max_reference: 100
  skew_bias_note: "Prefer direction supported by market skew when momentum is already established."
  sizing_note: "Dynamic sizing using Kelly Criterion; tune risk per user preference."
  optional_hedge_note: "When skew is extreme (for example >=95/5), allow a small opposite hedge to reduce last-second reversal risk."

# 多源数据配置
data_sources:
  binance:
    enabled: true
    ws_url: "wss://fstream.binance.com/ws"
    symbols: ["BTCUSDT"]
    depth_levels: 10
    agg_trade_window_sec: 60.0
  deribit:
    enabled: true
    ws_url: "wss://www.deribit.com/ws/api/v2"
    currency: "BTC"
  hyperliquid:
    enabled: false
    ws_url: "wss://api.hyperliquid.xyz/ws"
    coin: "BTC"

# 数据过滤规则
filters:
  obi:
    enabled: true
    threshold: 0.8
    weighted: false
    trend_window: 20
  volume_ratio:
    enabled: true
    buy_sell_ratio_min: 1.2
    window_sec: 60
  iv_rv:
    enabled: true
    iv_rv_ratio_max: 1.5
    pause_strategy_when_elevated: true

# 数学模型配置
models:
  gbm:
    enabled: true
    default_mu: 0.001
    default_sigma: 0.50
    min_win_probability: 0.65
    monte_carlo_paths: 10000
  atr:
    enabled: true
    period: 14
    alpha: 1.5
    use_dynamic_threshold: true
  ev:
    enabled: true
    min_ev: 0.05
    min_edge: 0.05

shared_rules:
  market_validation:
    require_active: true
    require_not_closed: true
    require_end_in_future_sec_min: 5
    candidate_slots: ["prev", "current", "next", "next2"]
    choose: "closest_valid"
  heartbeat:
    enabled: true
    max_stale_sec: 15
    check_interval_sec: 5
    fail_action: "skip"
  execution_safety:
    skip_if_quote_stale_sec_gt: 8
    skip_if_dns_or_api_errors_consecutive: 3
    skip_if_spread_gt: 0.03
    skip_if_top_ask_notional_usd_lt: 30
  session_timing:
    monitor_continuous: true
    min_entry_seconds_left: 60
    exit_before_sec: 20

# 狙击模式配置
sniper_mode:
  enabled: true
  window_start_sec: 5
  window_end_sec: 2
  min_win_probability: 0.98
  min_obi: 0.7
  max_stake_usd: 10.0
  gas_urgency: "high"

profiles:
  conservative:
    description: "More stable mode: stricter filters and lower per-trade risk."
    signal:
      trigger_source: "clob_best_ask"
      direction_rule: "follow_stronger_side_over_threshold"
      threshold_price: 0.70
    sizing:
      stake_mode: "kelly_criterion"
      kelly_fraction_type: "quarter"
      risk_per_trade_pct_equity: 8
      max_notional_usd: 8
      max_position_pct: 5.0
      daily_max_loss_pct: 10
      max_trades_per_day: 12
    hedge:
      enabled: true
      trigger_side_price_gte: 0.95
      trigger_seconds_left_lte: 45
      hedge_share_of_main_pct: 3
      hedge_notional_usd_min: 1
      hedge_notional_usd_max: 2
    stop_loss:
      enabled: true
      stop_loss_pct_from_entry: 0.25
    circuit_breaker:
      enabled: true
      daily_max_loss_pct: 10
      max_consecutive_losses: 3
      max_drawdown_pct: 15
      auto_kill_on_breach: true

  aggressive:
    description: "Higher frequency and higher risk mode."
    signal:
      trigger_source: "clob_best_ask"
      direction_rule: "follow_stronger_side_over_threshold"
      threshold_price: 0.70
    sizing:
      stake_mode: "kelly_criterion"
      kelly_fraction_type: "half"
      risk_per_trade_pct_equity: 15
      max_notional_usd: 15
      max_position_pct: 5.0
      daily_max_loss_pct: 15
      max_trades_per_day: 20
    hedge:
      enabled: true
      trigger_side_price_gte: 0.93
      trigger_seconds_left_lte: 50
      hedge_share_of_main_pct: 5
      hedge_notional_usd_min: 1
      hedge_notional_usd_max: 3
    stop_loss:
      enabled: true
      stop_loss_pct_from_entry: 0.30
    circuit_breaker:
      enabled: true
      daily_max_loss_pct: 15
      max_consecutive_losses: 3
      max_drawdown_pct: 20
      auto_kill_on_breach: true

# 监控与通知
monitoring:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  data_logging:
    enabled: true
    log_dir: "./data/logs"
    csv_format: true
  latency:
    enabled: true
    threshold_ms: 100
    alert_threshold_ms: 200

runner_mapping:
  script: "src/core/trade_runner.py"
  direct_flags_now_supported:
    - "--threshold"
    - "--stake-usd"
    - "--stop-loss-pct"
    - "--exit-before-sec"
    - "--min-entry-seconds-left"
    - "--entry-timeout-min"
    - "--poll-sec"
    - "--execute"
    - "--profile"
    - "--obi-threshold"
    - "--min-ev"
    - "--kelly-fraction"
  example_conservative_now: ".venv/bin/python src/core/trade_runner.py --profile conservative --obi-threshold 0.35 --min-ev 0.05 --kelly-fraction quarter --execute"
  example_aggressive_now: ".venv/bin/python src/core/trade_runner.py --profile aggressive --obi-threshold 0.35 --min-ev 0.05 --kelly-fraction half --execute"

notes:
  - "Institutional upgrade: Multi-source data + GBM + Kelly + Circuit Breaker"
  - "Entry behavior: OBI filter -> GBM win prob -> EV validation -> Kelly sizing -> Execute"
  - "Sniper mode enabled for last 5-2 seconds with extreme OBI and 98%+ win probability"
  - "All trades logged to CSV for backtesting and analysis"